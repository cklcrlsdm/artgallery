<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters of Art — Büyük Ressamlar Ansiklopedisi</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<style>
  /* ========== GÖNDERDİĞİNİZ ŞABLONUN BİREBİR CSS STİLLERİ ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:        #1a1209;
    --parchment:  #f5efe4;
    --cream:      #faf6ee;
    --gold:       #b8913a;
    --gold-light: #d4af6a;
    --gold-pale:  #ede0c4;
    --rust:       #7a3b1e;
    --shadow:     rgba(26,18,9,0.18);
    --divider:    rgba(184,145,58,0.35);
  }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    line-height: 1.75;
    cursor: default;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.6;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--parchment); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  #topnav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(245,239,228,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--divider); padding: 0 2.5rem; height: 58px;
    display: flex; align-items: center; justify-content: space-between;
  }

  #topnav .nav-logo {
    font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.22em; color: var(--gold); text-transform: uppercase; text-decoration: none;
  }

  #topnav nav { display: flex; gap: 2rem; align-items: center; }
  #topnav nav a {
    font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink); text-decoration: none; opacity: 0.7; transition: 0.2s;
  }
  #topnav nav a:hover { opacity: 1; color: var(--gold); }

  #hero {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 6rem 2rem 4rem; position: relative; overflow: hidden;
  }

  #hero::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
    background: linear-gradient(to bottom, transparent, var(--cream)); pointer-events: none;
  }

  .hero-ornament { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 2rem; opacity: 0; animation: fadeUp 1s ease 0.3s forwards; }
  .hero-title { font-family: 'Cinzel', serif; font-size: clamp(2.8rem, 7vw, 6.5rem); font-weight: 900; line-height: 1.05; color: var(--ink); letter-spacing: 0.04em; opacity: 0; animation: fadeUp 1s ease 0.55s forwards; }
  .hero-title span { color: var(--gold); font-style: italic; font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 1.15em; }
  .hero-sub { margin-top: 1.5rem; font-family: 'IM Fell English', serif; font-style: italic; font-size: 1.25rem; color: var(--rust); opacity: 0; animation: fadeUp 1s ease 0.8s forwards; max-width: 520px; }
  .hero-line { width: 120px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 2.5rem auto 0; opacity: 0; animation: fadeUp 1s ease 1s forwards; }
  
  .hero-stats { display: flex; gap: 3.5rem; margin-top: 3rem; opacity: 0; animation: fadeUp 1s ease 1.1s forwards; }
  .hero-stat { text-align: center; }
  .hero-stat strong { display: block; font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 600; color: var(--gold); line-height: 1; }
  .hero-stat span { font-size: 0.78rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.6; }

  #artists-index { padding: 5rem 2rem; max-width: 1100px; margin: 0 auto; }
  .section-header { text-align: center; margin-bottom: 4rem; }
  .section-label { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 1rem; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 300; font-style: italic; color: var(--ink); line-height: 1.2; }

  .artist-index-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0; border: 1px solid var(--divider); }
  .artist-index-item { padding: 1.1rem 1.2rem; border-right: 1px solid var(--divider); border-bottom: 1px solid var(--divider); cursor: pointer; transition: background 0.25s; text-decoration: none; color: var(--ink); display: block; }
  .artist-index-item:hover { background: var(--gold-pale); }
  .artist-index-item .idx-num { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--gold); display: block; margin-bottom: 0.3rem; }
  .artist-index-item .idx-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; line-height: 1.2; }
  .artist-index-item .idx-era { font-size: 0.72rem; opacity: 0.55; margin-top: 0.25rem; font-style: italic; }

  .artist-section { padding: 6rem 0 3rem; border-top: 1px solid var(--divider); max-width: 1200px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .artist-section.visible { opacity: 1; transform: translateY(0); }
  
  .artist-header { display: grid; grid-template-columns: 1fr auto; gap: 2rem; align-items: end; margin-bottom: 3.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--divider); }
  .artist-number { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 0.8rem; }
  .artist-name { font-family: 'Cinzel', serif; font-size: clamp(2rem, 4.5vw, 4rem); font-weight: 900; color: var(--ink); line-height: 1; letter-spacing: 0.02em; }
  .artist-dates { font-family: 'IM Fell English', serif; font-style: italic; font-size: 1.1rem; color: var(--rust); margin-top: 0.6rem; display: block; }
  .artist-movement { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-top: 0.8rem; padding: 0.4rem 0.9rem; border: 1px solid var(--divider); display: inline-block; }
  .artist-bio { font-size: 1.05rem; line-height: 1.9; color: var(--ink); opacity: 0.88; max-width: 680px; font-family: 'IM Fell English', serif; }

  .artworks-grid { display: flex; flex-direction: column; gap: 0; }
  .artwork-row { display: grid; grid-template-columns: 1fr 1fr; min-height: 420px; border: 1px solid var(--divider); border-top: none; overflow: hidden; transition: box-shadow 0.3s ease; }
  .artwork-row:first-child { border-top: 1px solid var(--divider); }
  .artwork-row:hover { box-shadow: 0 8px 40px var(--shadow); z-index: 2; position: relative; }
  
  .artwork-row:nth-child(even) .artwork-image-wrap { order: 2; }
  .artwork-row:nth-child(even) .artwork-info      { order: 1; }

  .artwork-image-wrap { overflow: hidden; position: relative; background: var(--ink); cursor: zoom-in; }
  .artwork-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.6s, filter 0.4s; filter: saturate(0.92) brightness(0.96); }
  .artwork-row:hover .artwork-image-wrap img { transform: scale(1.04); filter: saturate(1.05) brightness(1.01); }
  .artwork-image-zoom-hint { position: absolute; bottom: 1rem; right: 1rem; background: rgba(26,18,9,0.65); color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.35rem 0.7rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .artwork-row:hover .artwork-image-zoom-hint { opacity: 1; }

  .artwork-info { padding: 2.5rem 2.8rem; display: flex; flex-direction: column; justify-content: center; background: var(--parchment); border-left: 1px solid var(--divider); }
  .artwork-row:nth-child(even) .artwork-info { border-left: none; border-right: 1px solid var(--divider); }
  
  .artwork-num { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.25em; color: var(--gold); margin-bottom: 1rem; }
  .artwork-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.4rem, 2.5vw, 2.1rem); font-weight: 600; color: var(--ink); line-height: 1.15; margin-bottom: 1.2rem; }
  .artwork-meta { display: grid; grid-template-columns: auto 1fr; gap: 0.3rem 1rem; margin-bottom: 1.4rem; font-size: 0.83rem; }
  .artwork-meta dt { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); padding-top: 0.15rem; white-space: nowrap; }
  .artwork-meta dd { color: var(--ink); opacity: 0.8; font-style: italic; font-family: 'IM Fell English', serif; }
  
  .artwork-divider { width: 50px; height: 1px; background: var(--gold); margin-bottom: 1.2rem; opacity: 0.5; }
  .artwork-story { font-size: 0.93rem; line-height: 1.85; color: var(--ink); opacity: 0.78; font-family: 'IM Fell English', serif; }

  #lightbox { display: none; position: fixed; inset: 0; z-index: 9000; background: rgba(10,7,3,0.96); align-items: center; justify-content: center; padding: 2rem; cursor: zoom-out; }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: min(92vw, 1000px); max-height: 88vh; object-fit: contain; box-shadow: 0 30px 100px rgba(0,0,0,0.8); border: 1px solid rgba(184,145,58,0.2); }
  #lightbox-caption { position: fixed; bottom: 2rem; left: 0; right: 0; text-align: center; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--gold-light); }
  #lightbox-close { position: fixed; top: 1.5rem; right: 2rem; font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold); background: none; border: 1px solid var(--gold); padding: 0.4rem 0.9rem; cursor: pointer; }

  #back-top { position: fixed; bottom: 2rem; right: 2rem; z-index: 800; width: 44px; height: 44px; border: 1px solid var(--gold); background: var(--parchment); color: var(--gold); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  #back-top.visible { opacity: 1; pointer-events: all; }
  #footer { text-align: center; padding: 4rem 2rem; border-top: 1px solid var(--divider); font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink); opacity: 0.45; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 768px) {
    .artwork-row { grid-template-columns: 1fr; min-height: auto; }
    .artwork-image-wrap { height: 280px; }
    .artwork-row:nth-child(even) .artwork-image-wrap { order: 1; }
    .artwork-row:nth-child(even) .artwork-info      { order: 2; }
    .artwork-info { border-left: none; padding: 1.8rem; }
    .artist-header { grid-template-columns: 1fr; }
    .artist-index-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header id="topnav">
  <a href="#hero" class="nav-logo">Masters of Art</a>
  <nav><a href="#artists-index">Ressamlar</a>
  <div class="lang-switch-container" style="position: relative; top: 0; right:0; display: flex; gap: 0.5rem; z-index: 100;">
  <button onclick="setLanguage('tr')" id="btn-lang-tr" style="background: var(--ink); color: var(--cream); border: 1px solid var(--gold); padding: 0.4rem 0.8rem; font-family: 'Cinzel', serif; cursor: pointer; font-size: 0.8rem; transition: all 0.3s;">TR</button>
  <button onclick="setLanguage('en')" id="btn-lang-en" style="background: transparent; color: var(--ink); border: 1px solid var(--divider); padding: 0.4rem 0.8rem; font-family: 'Cinzel', serif; cursor: pointer; font-size: 0.8rem; transition: all 0.3s;">EN</button>
</div>
  </nav>
</header>

<section id="hero">
  <p class="hero-ornament">— Sanatın Büyük Ustaları —</p>
  <h1 class="hero-title">Masters<br><span>of Art</span></h1>
  <p class="hero-sub">Tarihin en büyük ressamları ve zamanı aşan eserleri</p>
  <div class="hero-line"></div>
  <div class="hero-stats">
    <div class="hero-stat"><strong id="total-artists-count">0</strong><span>Ressam</span></div>
    <div class="hero-stat"><strong id="total-paintings-count">0</strong><span>Eser</span></div>
    <div class="hero-stat"><strong>600+</strong><span>Yıl Sanat</span></div>
  </div>
</section>

<section id="artists-index">
  <div class="section-header">
    <span class="section-label">Koleksiyon</span>
    <h2 class="section-title">Tüm Ressamlar</h2>
  </div>
  <div class="artist-index-grid" id="fihrist-container"></div>
</section>

<main id="main-content-flow"></main>

<footer id="footer">Masters of Art — Tüm Hakları Saklıdır</footer>

<div id="lightbox">
  <button id="lightbox-close">✕ Kapat</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>
<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script src="active_artists.js"></script>
<script>

  let totalPaintingsCount = 0;
  let observer;
// ==========================================
  // 1. DİNAMİK RESSAM LİSTESİ (BOŞ DİZİ)
  // ==========================================
  let activeArtists = [];

// Global Dil Ayarı (Varsayılan Türkçe, tarayıcı hafızasında varsa onu çeker)
let currentLang = localStorage.getItem('siteLang') || 'tr';

function setLanguage(lang) {
  localStorage.setItem('siteLang', lang);
  currentLang = lang;
  
  // Sayfayı temizle ve ressamları yeni seçilen dille baştan yükle
  document.getElementById('fihrist-container').innerHTML = '';
  document.getElementById('main-content-flow').innerHTML = '';
  totalPaintingsCount = 0;
  
  // Butonların aktiflik stilini güncelle
  updateLangButtons();
  
  // Arayüzdeki sabit metinleri çevir
  translateStaticUI();
  
  // Akışı baştan başlat
  ressamYükle(0);
}

function updateLangButtons() {
  const btnTr = document.getElementById('btn-lang-tr');
  const btnEn = document.getElementById('btn-lang-en');
  if (!btnTr || !btnEn) return;

  if (currentLang === 'en') {
    btnEn.style.background = 'var(--ink)'; btnEn.style.color = 'var(--cream)'; btnEn.style.borderColor = 'var(--gold)';
    btnTr.style.background = 'transparent'; btnTr.style.color = 'var(--ink)'; btnTr.style.borderColor = 'var(--divider)';
  } else {
    btnTr.style.background = 'var(--ink)'; btnTr.style.color = 'var(--cream)'; btnTr.style.borderColor = 'var(--gold)';
    btnEn.style.background = 'transparent'; btnEn.style.color = 'var(--ink)'; btnEn.style.borderColor = 'var(--divider)';
  }
}

function translateStaticUI() {
  // Sayfadaki sabit kelimeleri dile göre esnetiyoruz
  const fihristTitle = document.querySelector('.fihrist-title');
  if (fihristTitle) {
    fihristTitle.innerText = currentLang === 'en' ? 'INDEX OF MASTERS' : 'RESSAMLAR FİHRİSTİ';
  }
  // İhtiyacına göre alt bilgi veya diğer statik alanları da buraya ekleyebilirsin
}

updateLangButtons();
translateStaticUI();

document.addEventListener('DOMContentLoaded', function() {

  // ========================================================
  // OTO-TARAYICI: ARDIŞIK KLASÖRLERİ ARA (01, 02, 03...)
  // ========================================================
  function otomatikRessamKlasorleriniTara(artistNumber) {
    const folderPrefix = String(artistNumber).padStart(2, '0');
    const tempScript = document.createElement('script');
    
    // Klasörün varlığını denetlemek için bilgi.js'i yokluyoruz
    tempScript.src = `artists/${folderPrefix}/bilgi.js?v=${Date.now()}`;
    tempScript.async = false;

    tempScript.onload = () => {
      // Klasör bulunduysa listeye ekle ve geçici script'i temizle
      activeArtists.push(folderPrefix);
      tempScript.remove();
      // Bir sonraki numarayı aramaya devam et (02, 03...)
      otomatikRessamKlasorleriniTara(artistNumber + 1);
    };

    tempScript.onerror = () => {
      // Arama zinciri kırıldıysa (mesela 02 klasörü yoksa) tarama bitmiştir
      tempScript.remove();
      console.log(`[Sistem] Dinamik tarama bitti. Toplam bulunan ressam: ${activeArtists.length}`);
      
      // Bulunan dinamik ressam sayısını arayüze yazdırıyoruz
      document.getElementById('total-artists-count').innerText = activeArtists.length;

      // Her şey hazır olduğuna göre senin orijinal akışını tetikliyoruz
      if (activeArtists.length > 0) {
        ressamYükle(0);
      } else {
        document.getElementById('total-paintings-count').innerText = "0";
      }
    };

    document.head.appendChild(tempScript);
  }

  // Animasyonları kontrol eden orijinal gözlemcin
  observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.05 });

  // === DİNAMİK BAŞLANGIÇ TETİĞİ ===
  // Statik yükleme yerine tarama motorunu 1 numaralı (01) klasörden başlatıyoruz
  otomatikRessamKlasorleriniTara(1);

  // Lightbox & Scroll olayları (Birebir korunan orijinal kodların)
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this || e.target === document.getElementById('lightbox-img')) {
      this.classList.remove('open'); document.body.style.overflow = '';
    }
  });
  document.getElementById('lightbox-close').addEventListener('click', function() {
    document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = '';
  });
  window.addEventListener('scroll', function() {
    var btn = document.getElementById('back-top');
    if (window.scrollY > 400) btn.classList.add('visible');
    else btn.classList.remove('visible');
  });
});
// ==========================================
  // OTO-TARAYICI: ARDIŞIK KLASÖRLERİ ARA (01, 02, 03...)
  // ==========================================
  function otomatikRessamKlasorleriniTara(artistNumber) {
    const folderPrefix = String(artistNumber).padStart(2, '0');
    const tempScript = document.createElement('script');
    
    // Sadece kontrol etmek amacıyla bilgi.js dosyasını yokluyoruz
    tempScript.src = `artists/${folderPrefix}/bilgi.js?v=${Date.now()}`;
    tempScript.async = false;

    tempScript.onload = () => {
      // Eğer bu numaralı klasörde bilgi.js varsa, dizimize klasör adını (örn: "01") pushla
      activeArtists.push(folderPrefix);
      // Geçici scripti temizle ve bir sonraki numarayı aramaya devam et
      tempScript.remove();
      otomatikRessamKlasorleriniTara(artistNumber + 1);
    };

    tempScript.onerror = () => {
      // Ne zaman ki tarayıcı 404 hatası fırlatırsa (Örn: 02 yoksa), arama zinciri biter
      tempScript.remove();
      console.log(`[Sistem] Dinamik tarama tamamlandı. Toplam bulunan ressam: ${activeArtists.length}`);
      
      // Arama bittiğine göre artık orijinal kodundaki ressamYükle fonksiyonunu tetikleyebiliriz!
      if (activeArtists.length > 0) {
        ressamYükle(0);
      } else {
        document.getElementById('total-paintings-count').innerText = "0";
      }
    };

    document.head.appendChild(tempScript);
  }
  // 1. AŞAMA: Sıradaki ressamın bilgi.js dosyasını yükler
  function ressamYükle(artistIndex) {
  if (artistIndex >= activeArtists.length) {
    document.getElementById('total-paintings-count').innerText = totalPaintingsCount;
    return;
  }

  const folder = activeArtists[artistIndex];
  const ressamNoStr = String(artistIndex + 1).padStart(2, '0');

  // KURAL: Eğer dil İngilizce ise "artists/klasor/en/bilgi.js" yoluna git
  const langPath = currentLang === 'en' ? 'en/' : '';
  const bilgiScript = document.createElement('script');
  bilgiScript.src = `artists/${folder}/${langPath}bilgi.js?v=${Date.now()}`;
  bilgiScript.async = false;
  
  bilgiScript.onload = () => {
    const fihristContainer = document.getElementById('fihrist-container');
    const indexItem = document.createElement('a');
    indexItem.className = 'artist-index-item';
    indexItem.href = `#${folder}`;
    indexItem.innerHTML = `
      <span class="idx-num">${ressamNoStr}</span>
      <span class="idx-name">${artistInfo.name.replace('<br>', ' ')}</span>
      <span class="idx-era">${artistInfo.movement} · ${artistInfo.dates.split(',')[0]}</span>
    `;
    fihristContainer.appendChild(indexItem);

    let extraDetailsHTML = '';
    if (artistInfo.extraDetails && artistInfo.extraDetails.length > 0) {
      extraDetailsHTML = `<div class="artist-extra-details" style="margin-top: 2rem; border-top: 1px dashed var(--divider); padding-top: 1.5rem;">`;
      artistInfo.extraDetails.forEach(detail => {
        extraDetailsHTML += `
          <div style="margin-bottom: 1.5rem;">
            <h4 style="font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem;">${detail.title}</h4>
            <p class="artist-bio" style="font-size: 0.95rem; line-height: 1.7; opacity: 0.85; max-width: 800px;">${detail.content}</p>
          </div>
        `;
      });
      extraDetailsHTML += `</div>`;
    }

    const labelTarz = currentLang === 'en' ? 'Style' : 'Tarz';
    const labelRessam = currentLang === 'en' ? 'Master' : 'Ressam';

    const mainFlow = document.getElementById('main-content-flow');
    const section = document.createElement('section');
    section.className = 'artist-section';
    section.id = folder;
    section.innerHTML = `
      <div class="artist-header">
        <div>
          <span class="artist-number">${labelRessam} ${ressamNoStr}</span>
          <h2 class="artist-name">${artistInfo.name}</h2>
          <span class="artist-dates">${artistInfo.dates}</span>
          <span class="artist-movement">${artistInfo.movement}</span>
          ${artistInfo.style ? `<span class="artist-movement" style="display:block; margin-top:0.3rem; font-style:italic; opacity:0.8;">${labelTarz}: ${artistInfo.style}</span>` : ''}
        </div>
        <p class="artist-bio">${artistInfo.bio}</p>
        ${extraDetailsHTML}
      </div>
      <div class="artworks-grid" id="grid-${folder}"></div>
    `;
    mainFlow.appendChild(section);
    observer.observe(section);

    ardisikEserDosyasiTara(folder, 1, 1, artistIndex);
  };
  
  bilgiScript.onerror = () => {
    ressamYükle(artistIndex + 1);
  };
  document.head.appendChild(bilgiScript);
}

function ardisikEserDosyasiTara(folder, fileIndex, localWorkCounter, artistIndex) {
  const gridContainer = document.getElementById(`grid-${folder}`);
  const eserScript = document.createElement('script');
  
  // KURAL: Eğer dil İngilizce ise "artists/klasor/en/eserlerX.js" yoluna git
  const langPath = currentLang === 'en' ? 'en/' : '';
  eserScript.src = `artists/${folder}/${langPath}eserler${fileIndex}.js?v=${Date.now()}`;
  eserScript.async = false;

  eserScript.onload = () => {
    // Eser kartı künyesindeki kelimeleri dile göre seçiyoruz
    const lblYear = currentLang === 'en' ? 'Year' : 'Yıl';
    const lblTech = currentLang === 'en' ? 'Technique' : 'Teknik';
    const lblSize = currentLang === 'en' ? 'Size' : 'Boyut';
    const lblLoc = currentLang === 'en' ? 'Location' : 'Konum';
    const lblZoom = currentLang === 'en' ? 'Expand' : 'Büyüt';

    currentPaintings.forEach(eser => {
      totalPaintingsCount++;
      
      const row = document.createElement('div');
      row.className = 'artwork-row';
      row.innerHTML = `
        <div class="artwork-image-wrap" onclick="openLightbox(this)">
          <img src="${eser.img}" alt="${eser.title}" loading="lazy">
          <span class="artwork-image-zoom-hint">${lblZoom}</span>
        </div>
        <div class="artwork-info">
          <span class="artwork-num">${localWorkCounter}</span>
          <h3 class="artwork-title">${eser.title}</h3>
          <dl class="artwork-meta">
            <dt>${lblYear}</dt><dd>${eser.year}</dd>
            <dt>${lblTech}</dt><dd>${eser.technique}</dd>
            <dt>${lblSize}</dt><dd>${eser.size}</dd>
            <dt>${lblLoc}</dt><dd>${eser.location}</dd>
          </dl>
          <div class="artwork-divider"></div>
          <p class="artwork-story">${eser.story}</p>
        </div>
      `;
      gridContainer.appendChild(row);
      localWorkCounter++;
    });

    ardisikEserDosyasiTara(folder, fileIndex + 1, localWorkCounter, artistIndex);
  };

  eserScript.onerror = () => {
    const rows = gridContainer.querySelectorAll('.artwork-row');
    const totalLocalWorks = rows.length;
    rows.forEach((row, i) => {
      row.querySelector('.artwork-num').innerText = `${String(i + 1).padStart(2, '0')} / ${String(totalLocalWorks).padStart(2, '0')}`;
    });

    ressamYükle(artistIndex + 1);
  };

  document.head.appendChild(eserScript);
}
  function openLightbox(el) {
    var img = el.querySelector('img');
    if (!img) return;
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox-caption').textContent = img.alt;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
</script>
</body>
</html>
